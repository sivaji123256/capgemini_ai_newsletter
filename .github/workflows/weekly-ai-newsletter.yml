name: Weekly AI Newsletter

on:
  workflow_dispatch:
    inputs:
      dry_run_email:
        description: "Generate newsletter and log delivery without sending email"
        required: false
        default: false
        type: boolean
  schedule:
    # Monday 07:00 Asia/Dubai = Monday 03:00 UTC
    - cron: "0 3 * * 1"

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
      NEWSLETTER_FROM_NAME: ${{ secrets.NEWSLETTER_FROM_NAME }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
      GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
      GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
      GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$DATABASE_URL"
          test -n "$OPENAI_API_KEY"

      - name: Run weekly pipeline
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.dry_run_email }}" == "true" ]]; then
            EXTRA_ARGS="--dry-run-email"
          fi
          python run_weekly_pipeline.py $EXTRA_ARGS

      - name: Upload newsletter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ai-newsletter-artifacts
          path: |
            newsletter_output/
            ai_news_collection_output/
